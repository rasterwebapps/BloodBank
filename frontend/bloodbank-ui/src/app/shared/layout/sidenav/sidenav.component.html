@if (isMobile() && !collapsed()) {
  <div class="sidenav-backdrop" (click)="onBackdropClick()"></div>
}

<nav
  class="sidenav"
  [class.sidenav-collapsed]="collapsed()"
  [class.sidenav-mobile]="isMobile()"
  [class.sidenav-mobile-open]="isMobile() && !collapsed()"
  role="navigation"
  [attr.aria-label]="'NAV.MAIN_NAVIGATION' | translate">

  <!-- Brand -->
  <div class="sidenav-brand">
    <mat-icon class="brand-icon">bloodtype</mat-icon>
    @if (!collapsed()) {
      <span class="brand-text">{{ 'APP.NAME' | translate }}</span>
    }
  </div>

  <!-- Nav items -->
  <mat-nav-list>
    @for (item of navItems(); track item.route) {
      <a
        mat-list-item
        [routerLink]="item.route"
        routerLinkActive="active-link"
        [matTooltip]="collapsed() ? (item.labelKey | translate) : ''"
        matTooltipPosition="right"
        (click)="onBackdropClick()">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        @if (!collapsed()) {
          <span matListItemTitle>{{ item.labelKey | translate }}</span>
        }
      </a>
    }
  </mat-nav-list>
</nav>
