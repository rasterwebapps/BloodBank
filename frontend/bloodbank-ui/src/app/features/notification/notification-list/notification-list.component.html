<div class="notification-list-container p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Notifications</h1>
    <div class="flex gap-2">
      <button mat-raised-button routerLink="/staff/notifications/campaigns">
        <mat-icon>campaign</mat-icon>
        Campaigns
      </button>
      <button mat-raised-button routerLink="/staff/notifications/templates">
        <mat-icon>wysiwyg</mat-icon>
        Templates
      </button>
    </div>
  </div>

  @if (loading()) {
    <app-loading-skeleton [rows]="6" [columns]="5" />
  } @else if (error()) {
    <app-error-card [message]="error() ?? ''" (retry)="loadNotifications()" />
  } @else if (isEmpty()) {
    <app-empty-state icon="notifications_none" message="No notifications sent yet" />
  } @else {
    <app-data-table
      [dataSource]="notifications()"
      [columns]="displayedColumns"
      [totalElements]="totalElements()"
      [pageSize]="pageSize()"
      [loading]="loading()"
      (pageChange)="onPageChange($event)">

      <ng-container matColumnDef="recipientName">
        <th mat-header-cell *matHeaderCellDef>Recipient</th>
        <td mat-cell *matCellDef="let n"><span class="font-medium">{{ n.recipientName }}</span></td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Channel</th>
        <td mat-cell *matCellDef="let n">
          <mat-chip>{{ n.type }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="subject">
        <th mat-header-cell *matHeaderCellDef>Subject</th>
        <td mat-cell *matCellDef="let n">{{ n.subject ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let n"><app-status-badge [status]="n.status" /></td>
      </ng-container>

      <ng-container matColumnDef="sentAt">
        <th mat-header-cell *matHeaderCellDef>Sent</th>
        <td mat-cell *matCellDef="let n">
          @if (n.sentAt) { {{ n.sentAt | date:'medium' }} } @else { — }
        </td>
      </ng-container>
    </app-data-table>
  }
</div>
