<div class="recall-list-container p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Recall Records</h1>
  </div>

  @if (loading()) {
    <app-loading-skeleton [rows]="6" [columns]="7" />
  } @else if (error()) {
    <app-error-card [message]="error() ?? ''" (retry)="loadRecalls()" />
  } @else if (isEmpty()) {
    <app-empty-state icon="undo" message="No recall records found" />
  } @else {
    <app-data-table
      [dataSource]="recalls()"
      [columns]="displayedColumns"
      [totalElements]="totalElements()"
      [pageSize]="pageSize()"
      [loading]="loading()"
      (pageChange)="onPageChange($event)">

      <ng-container matColumnDef="recallNumber">
        <th mat-header-cell *matHeaderCellDef>Recall #</th>
        <td mat-cell *matCellDef="let r"><span class="font-mono text-sm">{{ r.recallNumber }}</span></td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let r"><span class="font-medium">{{ r.title }}</span></td>
      </ng-container>

      <ng-container matColumnDef="recallClass">
        <th mat-header-cell *matHeaderCellDef>Class</th>
        <td mat-cell *matCellDef="let r">
          <mat-chip color="warn" highlighted>{{ r.recallClass }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="unitsAffected">
        <th mat-header-cell *matHeaderCellDef>Affected</th>
        <td mat-cell *matCellDef="let r">{{ r.unitsAffected }}</td>
      </ng-container>

      <ng-container matColumnDef="unitsRecovered">
        <th mat-header-cell *matHeaderCellDef>Recovered</th>
        <td mat-cell *matCellDef="let r">
          <span [class.text-green-600]="r.unitsRecovered === r.unitsAffected">
            {{ r.unitsRecovered }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="initiatedDate">
        <th mat-header-cell *matHeaderCellDef>Initiated</th>
        <td mat-cell *matCellDef="let r">{{ r.initiatedDate | date:'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r"><app-status-badge [status]="r.status" /></td>
      </ng-container>
    </app-data-table>
  }
</div>
