<div class="branch-list-container p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Branches</h1>
    <div class="flex gap-2">
      @if (isSuperAdmin()) {
        <button
          mat-stroked-button
          (click)="goToMasterData()"
          aria-label="Manage master data">
          <mat-icon>settings</mat-icon>
          Master Data
        </button>
        <button
          mat-raised-button
          color="primary"
          (click)="addBranch()"
          aria-label="Add a new branch">
          <mat-icon>add</mat-icon>
          Add Branch
        </button>
      }
    </div>
  </div>

  <!-- Search Bar -->
  <div class="mb-4">
    <app-search-bar
      placeholder="Search branches by name, code, or city..."
      [debounceMs]="300"
      (searchChange)="onSearch($event)" />
  </div>

  @if (loading()) {
    <app-loading-skeleton [rows]="6" [columns]="6" />
  } @else if (error()) {
    <app-error-card [message]="error() ?? ''" (retry)="loadBranches()" />
  } @else if (isEmpty()) {
    <app-empty-state
      icon="account_balance"
      message="No branches found"
      [actionLabel]="isSuperAdmin() ? 'Add Branch' : ''"
      (action)="addBranch()" />
  } @else {
    <app-data-table
      [dataSource]="branches()"
      [columns]="displayedColumns"
      [totalElements]="totalElements()"
      [pageSize]="pageSize()"
      [loading]="loading()"
      (pageChange)="onPageChange($event)">

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let branch">
          <a
            class="branch-name-link font-medium"
            [routerLink]="['/staff/branches', branch.id]">
            {{ branch.name }}
          </a>
        </td>
      </ng-container>

      <!-- Code Column -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let branch">
          <span class="font-mono text-sm">{{ branch.code }}</span>
        </td>
      </ng-container>

      <!-- City Column -->
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef>City</th>
        <td mat-cell *matCellDef="let branch">{{ branch.city }}</td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let branch">
          <app-status-badge [status]="branch.status" />
        </td>
      </ng-container>

      <!-- Capacity Column -->
      <ng-container matColumnDef="capacity">
        <th mat-header-cell *matHeaderCellDef>Capacity</th>
        <td mat-cell *matCellDef="let branch">{{ branch.capacity }}</td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let branch">
          <button
            mat-icon-button
            matTooltip="View Details"
            aria-label="View branch details"
            (click)="viewBranch(branch)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button
            mat-icon-button
            matTooltip="Edit"
            aria-label="Edit branch"
            (click)="editBranch(branch)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>
    </app-data-table>
  }
</div>
