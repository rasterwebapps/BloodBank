# ─── Platform / BOM versions (production-pinned) ─────────────────────────────
springBootVersion=3.4.5
springCloudVersion=2024.0.1
testcontainersVersion=1.20.4

# ─── Library versions (kept aligned with Spring Boot 3.4.5 BOM where possible)
mapstructVersion=1.6.3
springdocVersion=2.8.4
resilience4jVersion=2.2.0

# ─── Database / migrations ───────────────────────────────────────────────────
# Pinned explicitly so the Flyway Gradle plugin (which has its own classloader)
# and the Spring Boot runtime always agree on the driver version.
flywayVersion=10.21.0
postgresqlVersion=42.7.4

# ─── Object storage ──────────────────────────────────────────────────────────
minioVersion=8.5.12

# ─── Gradle build performance ────────────────────────────────────────────────
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false
