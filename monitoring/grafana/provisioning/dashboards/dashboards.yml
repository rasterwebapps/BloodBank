apiVersion: 1

providers:
  - name: BloodBank Dashboards
    orgId: 1
    folder: BloodBank
    folderUid: bloodbank
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
