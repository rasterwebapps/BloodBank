global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: bloodbank
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # ─── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: api-gateway

  # ─── Config Server ────────────────────────────────────────────────────────────
  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - config-server:8888
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: config-server

  # ─── Branch Service ───────────────────────────────────────────────────────────
