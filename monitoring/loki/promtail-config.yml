server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels:
      environment: production
      cluster: bloodbank

scrape_configs:
  # ─── API Gateway ─────────────────────────────────────────────────────────────
  - job_name: api-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-gateway
          service: api-gateway
          __path__: /var/log/bloodbank/api-gateway/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            traceId: traceId
            spanId: spanId
            service: service
      - labels:
          level:
          traceId:
          spanId:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ─── Branch Service ───────────────────────────────────────────────────────────
