  # ─── Docker containers (via container log path) ───────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values:
              - com.docker.compose.project=bloodbank
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: job
    pipeline_stages:
      - json:
          expressions:
            timestamp: "@timestamp"
            level: level
            message: message
            logger: logger_name
            traceId: traceId
            spanId: spanId
            thread: thread_name
      - labels:
          level:
          logger:
          traceId:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: message
