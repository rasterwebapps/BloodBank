# config-server Service — ClusterIP (internal only)
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: bloodbank
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      protocol: TCP
