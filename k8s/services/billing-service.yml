# billing-service Service — ClusterIP (internal only)
# Canary: selector omits track so both stable and canary pods receive traffic
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/part-of: bloodbank
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: billing-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      protocol: TCP
