# frontend Deployment (Blue-Green strategy)
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: bloodbank
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      version: blue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: bloodbank
        version: blue
    spec:
      containers:
        - name: frontend
          image: bloodbank/frontend:${IMAGE_TAG}
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
