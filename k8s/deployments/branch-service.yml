# branch-service Deployment (Rolling strategy)
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: branch-service
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: branch-service
    app.kubernetes.io/part-of: bloodbank
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: branch-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: branch-service
        app.kubernetes.io/part-of: bloodbank
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://config-server:8888/actuator/health; do
                echo "Waiting for config-server..."
                sleep 5
              done
      containers:
        - name: branch-service
          image: bloodbank/branch-service:${IMAGE_TAG}
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: bloodbank-shared-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: RABBITMQ_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
