# lab-service Deployment (Blue-Green strategy)
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-service-blue
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: lab-service
    app.kubernetes.io/part-of: bloodbank
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-service
      version: blue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-service
        app.kubernetes.io/part-of: bloodbank
        version: blue
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://config-server:8888/actuator/health; do
                echo "Waiting for config-server..."
                sleep 5
              done
      containers:
        - name: lab-service
          image: bloodbank/lab-service:${IMAGE_TAG}
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: bloodbank-shared-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: RABBITMQ_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
