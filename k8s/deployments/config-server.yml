# config-server Deployment
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/part-of: bloodbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-server
        app.kubernetes.io/part-of: bloodbank
    spec:
      containers:
        - name: config-server
          image: bloodbank/config-server:${IMAGE_TAG}
          ports:
            - containerPort: 8888
          env:
            - name: ENCRYPT_KEY
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: ENCRYPT_KEY
            - name: SPRING_PROFILES_ACTIVE
              value: "prod,native"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
