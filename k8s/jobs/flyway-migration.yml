# Flyway migration Job — must complete successfully before any service deployment.
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migration
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: flyway-migration
    app.kubernetes.io/part-of: bloodbank
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flyway-migration
        app.kubernetes.io/part-of: bloodbank
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 5
              done
              echo "PostgreSQL is ready."
      containers:
        - name: flyway
          image: bloodbank/db-migration:${IMAGE_TAG}
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: bloodbank-shared-config
                  key: SPRING_DATASOURCE_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bloodbank-secrets
                  key: DB_PASSWORD
