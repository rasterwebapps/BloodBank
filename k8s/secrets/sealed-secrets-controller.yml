# =============================================================================
# sealed-secrets-controller.yml
# BloodBank — Bitnami Sealed Secrets Controller Installation
#
# This file documents the controller installation via Helm.
# The controller decrypts SealedSecret resources into native K8s Secrets.
#
# Prerequisites:
#   - helm >= 3.x installed
#   - cluster-admin access to the target cluster
#
# Install:
#   helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#   helm repo update
#   helm install sealed-secrets sealed-secrets/sealed-secrets \
#     --namespace kube-system \
#     --version 2.16.1 \
#     --set fullnameOverride=sealed-secrets-controller \
#     --set resources.requests.cpu=50m \
#     --set resources.requests.memory=64Mi \
#     --set resources.limits.cpu=200m \
#     --set resources.limits.memory=128Mi
#
# Verify:
#   kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets
#   kubectl get crd sealedsecrets.bitnami.com
#
# Fetch cluster public key (safe to commit to Git):
#   kubeseal --fetch-cert \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     > k8s/secrets/sealed-secrets-pub.pem
# =============================================================================
#
# If Helm is not available, apply the official static manifest instead:
#   kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.1/controller.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# RBAC — allow the controller to manage SealedSecrets and native Secrets
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sealed-secrets-controller
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
rules:
  # Read SealedSecrets from any namespace
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch"]
  # Update SealedSecret status
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets/status"]
    verbs: ["update"]
  # Create/update/delete the decrypted K8s Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Read the master sealing key stored in kube-system
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update"]
  # Emit events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Namespaces (needed for namespace-scoped decryption)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sealed-secrets-controller
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sealed-secrets-controller
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-controller
    namespace: kube-system

---
# Role to manage the master sealing key Secret in kube-system
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-key-admin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealed-secrets-key-admin
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-controller
    namespace: kube-system

---
# -----------------------------------------------------------------------------
# CustomResourceDefinition — SealedSecret
# NOTE: The official CRD is installed by Helm / the static manifest above.
# This reference is here for documentation purposes only.
# To view the actual CRD after install:
#   kubectl get crd sealedsecrets.bitnami.com -o yaml
# -----------------------------------------------------------------------------

---
# -----------------------------------------------------------------------------
# Controller Deployment
# NOTE: When using Helm (recommended), this Deployment is managed by Helm.
# Only apply this directly if you cannot use Helm.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
    app.kubernetes.io/version: "0.27.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sealed-secrets
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: bloodbank-infra
    spec:
      serviceAccountName: sealed-secrets-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sealed-secrets
          image: docker.io/bitnami/sealed-secrets-controller:0.27.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: metrics
          command:
            - controller
          args:
            - --key-prefix=sealed-secrets-key
            - --key-renew-period=720h   # Rotate master key every 30 days
            - --accept-deprecated-v1-data=false
          env:
            - name: WATCH_NAMESPACE
              value: ""   # Empty = watch all namespaces
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true

---
# Expose metrics for Prometheus scraping
apiVersion: v1
kind: Service
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: bloodbank-infra
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 8081
      targetPort: 8081
  selector:
    app.kubernetes.io/name: sealed-secrets
