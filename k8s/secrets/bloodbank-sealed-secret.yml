# =============================================================================
# bloodbank-sealed-secret.yml
# BloodBank — SealedSecret template for all namespaces
#
# ⚠️  DO NOT apply this file directly — it contains PLACEHOLDER values.
#
# Run the seal-secrets.sh script to generate real encrypted values:
#   bash k8s/scripts/seal-secrets.sh bloodbank-prod
#   bash k8s/scripts/seal-secrets.sh bloodbank-uat
#   bash k8s/scripts/seal-secrets.sh bloodbank-staging
#   bash k8s/scripts/seal-secrets.sh bloodbank-dev
#
# Each invocation produces a ready-to-apply file:
#   k8s/secrets/bloodbank-sealed-secret-prod.yml
#   k8s/secrets/bloodbank-sealed-secret-uat.yml
#   k8s/secrets/bloodbank-sealed-secret-staging.yml
#   k8s/secrets/bloodbank-sealed-secret-dev.yml
#
# The controller decrypts each SealedSecret into a native K8s Secret named
# "bloodbank-secrets" in the target namespace.  All deployments reference
# that Secret via secretKeyRef and require no changes.
#
# Apply:
#   kubectl apply -f k8s/secrets/bloodbank-sealed-secret-prod.yml
#
# Verify:
#   kubectl get secret bloodbank-secrets -n bloodbank-prod
# =============================================================================

# -----------------------------------------------------------------------------
# PRODUCTION namespace
# -----------------------------------------------------------------------------
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: bloodbank-secrets
  namespace: bloodbank-prod
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
  labels:
    app.kubernetes.io/name: bloodbank-secrets
    app.kubernetes.io/component: credentials
    app.kubernetes.io/part-of: bloodbank
    environment: production
spec:
  # scope: strict means this SealedSecret can only be decrypted in bloodbank-prod.
  # It cannot be copied to another namespace and decrypted there.
  encryptedData:
    # ── Database ────────────────────────────────────────────────────────────
    # Generate with: echo -n 'bloodbank_prod_user' | kubeseal --raw \
    #   --namespace bloodbank-prod --name bloodbank-secrets \
    #   --controller-name sealed-secrets-controller \
    #   --controller-namespace kube-system --from-file /dev/stdin
    DB_USERNAME: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE
    DB_PASSWORD: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE

    # ── RabbitMQ ─────────────────────────────────────────────────────────────
    RABBITMQ_USERNAME: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE
    RABBITMQ_PASSWORD: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE

    # ── MinIO (document-service) ─────────────────────────────────────────────
    MINIO_ACCESS_KEY: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE
    MINIO_SECRET_KEY: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE

    # ── Spring Cloud Config Server ───────────────────────────────────────────
    # 256-bit random key used to encrypt/decrypt property values in config-repo.
    # Generate a fresh key: openssl rand -hex 32
    ENCRYPT_KEY: PLACEHOLDER_RUN_seal-secrets.sh_TO_GENERATE
  template:
    metadata:
      name: bloodbank-secrets
      namespace: bloodbank-prod
      labels:
        app.kubernetes.io/name: bloodbank-secrets
        app.kubernetes.io/component: credentials
        app.kubernetes.io/part-of: bloodbank
        environment: production
    type: Opaque

