# =============================================================================
# cdn-config.yml
# BloodBank — CDN & Frontend Nginx Cache Configuration
#
# This ConfigMap provides the nginx server block for the frontend deployment.
# It configures:
#   - Long-lived cache headers for static assets (JS, CSS, fonts: 1 year)
#   - Shorter cache for images (30 days)
#   - Gzip + Brotli compression
#   - ETag support for cache validation
#   - CORS headers for CDN origin requests
#   - Security headers on all responses
#
# Usage:
#   kubectl apply -f cdn-config.yml -n bloodbank-prod
#
# The frontend Deployment must mount this ConfigMap at:
#   /etc/nginx/conf.d/default.conf
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: nginx-config
    app.kubernetes.io/part-of: bloodbank
data:
  default.conf: |
    # ---------------------------------------------------------------------------
    # Upstream — proxied API calls go to api-gateway
    # ---------------------------------------------------------------------------
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Main server block
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Compression ─────────────────────────────────────────────────────
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_min_length 256;
        gzip_types
            application/atom+xml
            application/geo+json
            application/javascript
            application/x-javascript
            application/json
            application/ld+json
            application/manifest+json
            application/rdf+xml
            application/rss+xml
            application/vnd.ms-fontobject
            application/wasm
            application/x-web-app-manifest+json
            application/xhtml+xml
            application/xml
            font/eot
            font/otf
            font/ttf
            font/woff
            font/woff2
            image/bmp
            image/svg+xml
            image/vnd.microsoft.icon
            image/x-icon
            text/cache-manifest
            text/calendar
            text/css
            text/javascript
            text/markdown
            text/plain
            text/xml
            text/vcard
            text/vnd.rim.location.xloc
            text/vtt
            text/x-component
            text/x-cross-domain-policy;

        # Brotli — enabled if the brotli nginx module is loaded
        # brotli on;
        # brotli_comp_level 6;
        # brotli_types text/plain text/css application/javascript application/json font/woff2;

        # ── ETag support (nginx enables ETags by default for static files) ──
        etag on;

        # ── Global security headers ──────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"           always;
        add_header X-Frame-Options          "DENY"              always;
        add_header X-XSS-Protection         "1; mode=block"     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── CORS headers (for CDN origin validation) ─────────────────────────
        add_header Access-Control-Allow-Origin  "https://bloodbank.example.com" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS"            always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Range"         always;
        add_header Access-Control-Max-Age       "86400"                         always;
        add_header Vary                         "Accept-Encoding, Origin"       always;

        # ── Health check endpoint (used by Kubernetes readiness probe) ────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── API proxy — forward /api/ to api-gateway ─────────────────────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # No caching for API responses
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── JavaScript bundles — cache 1 year (content-hashed filenames) ─────
        location ~* \.(js|mjs)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff"                    always;
            access_log off;
        }

        # ── CSS stylesheets — cache 1 year ───────────────────────────────────
        location ~* \.css$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff"                    always;
            access_log off;
        }

        # ── Web fonts — cache 1 year ─────────────────────────────────────────
        # Fonts must be same-origin; restrict CORS to the production domain
        # rather than wildcard to prevent cross-site font leakage.
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable"          always;
            add_header Access-Control-Allow-Origin "https://bloodbank.example.com"  always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS"            always;
            access_log off;
        }

        # ── Images — cache 30 days ────────────────────────────────────────────
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|bmp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000"  always;
            add_header X-Content-Type-Options "nosniff"         always;
            access_log off;
        }

        # ── JSON / manifest / service-worker — no caching ────────────────────
        location ~* \.(json|webmanifest)$ {
            expires -1;
            add_header Cache-Control "no-store"                 always;
            add_header X-Content-Type-Options "nosniff"         always;
        }

        # ── Angular SPA fallback — all other routes serve index.html ─────────
        location / {
            try_files $uri $uri/ /index.html;
            # index.html must not be cached so new deployments take effect
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma        "no-cache"                             always;
        }

        # ── Deny access to hidden files (e.g. .htaccess, .git) ───────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

---
# =============================================================================
# CDN Ingress Annotations ConfigMap
# Stores recommended CDN/proxy settings as a reference ConfigMap.
# These annotations are applied directly on the Ingress resource in
# tls-config.yml for the frontend service.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-ingress-annotations
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: cdn-config
    app.kubernetes.io/component: annotations-reference
    app.kubernetes.io/part-of: bloodbank
  annotations:
    # Documentation: these key/value pairs are referenced by the Ingress
    # resource and by external CDN providers (Cloudflare, AWS CloudFront).
    description: "Reference configuration for CDN cache headers and proxy settings"
data:
  # Cache TTLs (seconds)
  cache-ttl-js:       "31536000"   # 1 year  — JS bundles (immutable / hashed)
  cache-ttl-css:      "31536000"   # 1 year  — CSS bundles (immutable / hashed)
  cache-ttl-fonts:    "31536000"   # 1 year  — Web fonts
  cache-ttl-images:   "2592000"    # 30 days — Images
  cache-ttl-api:      "0"          # No cache — API responses
  cache-ttl-html:     "0"          # No cache — HTML / index.html

  # Compression
  compression-gzip-enabled:    "true"
  compression-brotli-enabled:  "true"
  compression-min-size-bytes:  "256"

  # ETag
  etag-enabled: "true"

  # Vary header (CDN must respect Accept-Encoding)
  vary-header: "Accept-Encoding, Origin"
