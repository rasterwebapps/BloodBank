# HPA for donor-service — min 2, max 10, CPU target 70%
# Namespace options: bloodbank-dev | bloodbank-staging | bloodbank-uat | bloodbank-prod
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: donor-service-hpa
  namespace: bloodbank-prod
  labels:
    app.kubernetes.io/name: donor-service
    app.kubernetes.io/part-of: bloodbank
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: donor-service-blue
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
