x-backend-env: &backend-env
  SPRING_CONFIG_IMPORT: "configserver:http://config-server:8888"
  SPRING_CLOUD_CONFIG_URI: http://config-server:8888
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodbank_db
  DB_USERNAME: bloodbank
  DB_PASSWORD: bloodbank
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8180/realms/bloodbank
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/bloodbank/protocol/openid-connect/certs

x-backend-depends: &backend-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  keycloak:
    condition: service_healthy
  config-server:
    condition: service_healthy

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:17
    container_name: bloodbank-postgres
    environment:
      POSTGRES_DB: bloodbank_db
      POSTGRES_USER: bloodbank
      POSTGRES_PASSWORD: bloodbank
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloodbank -d bloodbank_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: bloodbank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: bloodbank-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bloodbank-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/bloodbank_db
      KC_DB_USERNAME: bloodbank
      KC_DB_PASSWORD: bloodbank
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: bloodbank-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bloodbank-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Config Server (must start before all other backend services) ─────────────

  config-server:
    build:
      context: .
      dockerfile: backend/config-server/Dockerfile
    image: bloodbank/config-server:latest
    container_name: bloodbank-config-server
    environment:
      ENCRYPT_KEY: bloodbank-config-encryption-key-change-in-production
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Flyway Migration (runs once before application services) ─────────────────

  flyway-migration:
    build:
      context: .
      dockerfile: shared-libs/db-migration/Dockerfile
    image: bloodbank/db-migration:latest
    container_name: bloodbank-flyway-migration
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bloodbank_db
      DB_USERNAME: bloodbank
      DB_PASSWORD: bloodbank
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Backend Services ─────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    image: bloodbank/api-gateway:latest
    container_name: bloodbank-api-gateway
    environment:
      <<: *backend-env
    ports:
      - "8080:8080"
    depends_on:
      <<: *backend-depends
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  branch-service:
    build:
      context: .
      dockerfile: backend/branch-service/Dockerfile
    image: bloodbank/branch-service:latest
    container_name: bloodbank-branch-service
    environment:
      <<: *backend-env
    ports:
      - "8081:8081"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  donor-service:
    build:
      context: .
      dockerfile: backend/donor-service/Dockerfile
    image: bloodbank/donor-service:latest
    container_name: bloodbank-donor-service
    environment:
      <<: *backend-env
    ports:
      - "8082:8082"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  lab-service:
    build:
      context: .
      dockerfile: backend/lab-service/Dockerfile
    image: bloodbank/lab-service:latest
    container_name: bloodbank-lab-service
    environment:
      <<: *backend-env
    ports:
      - "8083:8083"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  inventory-service:
    build:
      context: .
      dockerfile: backend/inventory-service/Dockerfile
    image: bloodbank/inventory-service:latest
    container_name: bloodbank-inventory-service
    environment:
      <<: *backend-env
    ports:
      - "8084:8084"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  transfusion-service:
    build:
      context: .
      dockerfile: backend/transfusion-service/Dockerfile
    image: bloodbank/transfusion-service:latest
    container_name: bloodbank-transfusion-service
    environment:
      <<: *backend-env
    ports:
      - "8085:8085"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  hospital-service:
    build:
      context: .
      dockerfile: backend/hospital-service/Dockerfile
    image: bloodbank/hospital-service:latest
    container_name: bloodbank-hospital-service
    environment:
      <<: *backend-env
    ports:
      - "8086:8086"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  request-matching-service:
    build:
      context: .
      dockerfile: backend/request-matching-service/Dockerfile
    image: bloodbank/request-matching-service:latest
    container_name: bloodbank-request-matching-service
    environment:
      <<: *backend-env
    ports:
      - "8087:8087"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  billing-service:
    build:
      context: .
      dockerfile: backend/billing-service/Dockerfile
    image: bloodbank/billing-service:latest
    container_name: bloodbank-billing-service
    environment:
      <<: *backend-env
    ports:
      - "8088:8088"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  notification-service:
    build:
      context: .
      dockerfile: backend/notification-service/Dockerfile
    image: bloodbank/notification-service:latest
    container_name: bloodbank-notification-service
    environment:
      <<: *backend-env
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
    ports:
      - "8089:8089"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  reporting-service:
    build:
      context: .
      dockerfile: backend/reporting-service/Dockerfile
    image: bloodbank/reporting-service:latest
    container_name: bloodbank-reporting-service
    environment:
      <<: *backend-env
    ports:
      - "8090:8090"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  document-service:
    build:
      context: .
      dockerfile: backend/document-service/Dockerfile
    image: bloodbank/document-service:latest
    container_name: bloodbank-document-service
    environment:
      <<: *backend-env
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8091:8091"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  compliance-service:
    build:
      context: .
      dockerfile: backend/compliance-service/Dockerfile
    image: bloodbank/compliance-service:latest
    container_name: bloodbank-compliance-service
    environment:
      <<: *backend-env
    ports:
      - "8092:8092"
    depends_on:
      <<: *backend-depends
      flyway-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend/bloodbank-ui
      dockerfile: Dockerfile
    image: bloodbank/frontend:latest
    container_name: bloodbank-frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Monitoring Stack ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: bloodbank-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  grafana:
    image: grafana/grafana:10.4.2
    container_name: bloodbank-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: bloodbank_admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  loki:
    image: grafana/loki:2.9.7
    container_name: bloodbank-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:2.9.7
    container_name: bloodbank-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.4.2
    container_name: bloodbank-tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bloodbank-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.advertise-address=0.0.0.0:9093
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bloodbank-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://bloodbank:bloodbank@postgres:5432/bloodbank_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: bloodbank-redis-exporter
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: bloodbank-node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"

volumes:
  postgres-data:
    name: bloodbank-postgres-data
  redis-data:
    name: bloodbank-redis-data
  rabbitmq-data:
    name: bloodbank-rabbitmq-data
  minio-data:
    name: bloodbank-minio-data
  prometheus-data:
    name: bloodbank-prometheus-data
  grafana-data:
    name: bloodbank-grafana-data
  loki-data:
    name: bloodbank-loki-data
  promtail-positions:
    name: bloodbank-promtail-positions
  tempo-data:
    name: bloodbank-tempo-data
  alertmanager-data:
    name: bloodbank-alertmanager-data
