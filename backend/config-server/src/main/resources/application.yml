server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:${user.dir}/config-repo,classpath:/config-repo
        encrypt:
          enabled: true
  flyway:
    enabled: false

encrypt:
  key: ${ENCRYPT_KEY:bloodbank-config-encryption-key-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: INFO
