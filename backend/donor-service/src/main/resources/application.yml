server:
  port: 8082

spring:
  application:
    name: donor-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bloodbank_db
    username: bloodbank
    password: bloodbank
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
